<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>{% block title %}{% endblock title %}</title>
</head> 
<body class="bg-gray-100">
    <nav class="bg-indigo-500 p-4 text-white">
            <div>
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="ml-4 hover:text-gray-300">Dashboard</a>
                    <a href="{% url 'transaction_add' %}" class="ml-4 hover:text-gray-300">Add Transaction</a>
                    <a href="{% url 'transaction_list' %}" class="ml-4 hover:text-gray-300">View Transactions</a>
                    <a href="{% url 'goal_add' %}" class="ml-4 hover:text-gray-300">Add Goal</a>
                    <a href="{% url 'goal_list' %}" class="ml-4 hover:text-gray-300">View Goals</a>
                    <form method="post" action="{% url 'logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="ml-4 cursor-pointer hover:text-gray-300">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="ml-4 hover:text-gray-300">Login</a>
                    <a href="{% url 'register' %}" class="ml-4 hover:text-gray-300">Register</a>
                {% endif %}
            </div>
    </nav>
    {% block content %}{% endblock content %}
</body>
</html>
